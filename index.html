<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航站</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f9f9f9; }
        #sidebar { width: 200px; background: #fff; border-right: 1px solid #eee; height: 100vh; padding: 20px; position: fixed; }
        #main-menu { list-style: none; padding: 0; }
        #main-menu li { margin-bottom: 15px; }
        #main-menu a { text-decoration: none; color: #333; font-weight: bold; }
        #content-wrapper { margin-left: 240px; padding: 20px; flex: 1; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; width: 200px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card hstrong { display: block; margin-bottom: 5px; color: #007bff; }
        .card p { font-size: 12px; color: #666; margin: 0; }
        .sub-category h5 { border-left: 4px solid #007bff; padding-left: 10px; margin: 20px 0 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>分类导航</h3>
        <ul id="main-menu"><li>正在加载菜单...</li></ul>
    </div>

    <div id="content-wrapper">
        <div id="main-content">正在从 Notion 加载数据...</div>
    </div>

<script>
fetch('./src/webstack.json?v=' + new Date().getTime())
  .then(response => {
    if (!response.ok) throw new Error('读取 webstack.json 失败');
    return response.json();
  })
  .then(data => {
    // 根据 image_df7e0f.png 显示的结构进行解析
    // 你的数据是一个数组，每个对象包含 taxonomy (一级分类) 和 links (链接列表)
    const siteStructure = data; 

    // 1. 渲染左侧菜单 (使用 taxonomy 字段)
    const menuContainer = document.getElementById('main-menu');
    if (menuContainer) {
      menuContainer.innerHTML = siteStructure.map(item => `
        <li>
          <a href="#${item.taxonomy}" class="smooth">
            <span class="title">${item.taxonomy}</span>
          </a>
        </li>
      `).join('');
    }

    // 2. 渲染右侧内容
    const contentContainer = document.getElementById('main-content');
    if (contentContainer) {
      contentContainer.innerHTML = siteStructure.map(group => `
        <div id="${group.taxonomy}">
          <h3 style="margin-top:40px; border-bottom: 2px solid #eee; padding-bottom:10px;">${group.taxonomy}</h3>
          <div class="row" style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px;">
            ${group.links.map(link => `
              <div class="card" onclick="window.open('${link.url}', '_blank')" 
                   style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; width: 220px; cursor: pointer; background: #fff;">
                <div style="display: flex; align-items: center; margin-bottom: 8px;">
                  <img src="${link.logo || ''}" onerror="this.style.display='none'" style="width:20px; height:20px; margin-right:8px;">
                  <strong style="color: #007bff;">${link.title}</strong>
                </div>
                <p style="font-size: 13px; color: #777; margin: 0;">${link.desc || link.summary || '暂无描述'}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }
  })
  .catch(err => {
    console.error(err);
    document.getElementById('main-content').innerHTML = `<div style="color:red;">数据加载失败: ${err.message}</div>`;
  });
</script>
</body>
</html>
