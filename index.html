<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FK 工具导航 - 科技推手</title>
    <link rel="shortcut icon" href="./assets/images/favicon.png" />
    <link rel="stylesheet" id="iconfont-css" href="./assets/css/iconfont-3.03029.1.css" type="text/css" media="all" />
    <link rel="stylesheet" id="bootstrap-css" href="./assets/css/bootstrap.min-4.3.1.css" type="text/css" media="all" />
    <link rel="stylesheet" id="iowen-css" href="./assets/css/iowen-3.03029.1.css" type="text/css" media="all" />
    <link rel="stylesheet" id="style-css" href="./assets/css/style-3.03029.1.css" type="text/css" media="all" />
    <script type="text/javascript" src="./assets/js/jquery.min-3.4.1.js" id="jquery-js"></script>
</head>

<body class="io-grey-mode">
    <div class="page-container">
        <div id="sidebar" class="sticky sidebar-nav fade animate-nav" style="width: 170px;">
            <div class="modal-dialog h-100 sidebar-nav-inner">
                <div class="sidebar-logo border-bottom border-color">
                    <div class="logo p-4 text-center">
                        <img src="./assets/images/logo@2x.png" width="160" alt="LOGO">
                    </div>
                </div>
                <div class="sidebar-menu flex-fill">
                    <div class="sidebar-scroll">
                        <div class="sidebar-menu-inner">
                            <ul id="main-menu" class="metismenu">
                                </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content flex-fill">
            <div id="search-bg" class="big-header-banner" style="background-image: url('./assets/images/bg-dna.jpg');">
                <div class="container-fluid p-0">
                    <div class="s-search mx-auto" style="max-width:800px; padding: 120px 0 80px;">
                        <div id="search-list" class="hide-type-list text-center mb-3">
                            <div class="search-group group-a">
                                <ul class="search-type">
                                    <li class="active"><span class="text-white">百度</span></li>
                                </ul>
                            </div>
                        </div>
                        <form action="https://www.baidu.com/s" method="get" target="_blank" class="super-search-fm">
                            <input type="text" name="wd" class="form-control smart-tips search-key" placeholder="输入搜索内容..." autocomplete="off">
                            <button type="submit"><i class="iconfont icon-search"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="content" class="content-site customize-site container-fluid p-md-4">
                <div id="main-content-render">
                    </div>
            </div>

            <footer class="main-footer footer-type-1 bg-white border-top p-3 text-center text-xs">
                <div class="copyright">
                    <p>© 2026 By <a href="https://blog.cunzhangblog.com">Cun Zhang</a> | 渝ICP备2023018588号</p>
                </div>
            </footer>
        </div>
    </div>

    <script type="text/javascript">
        $(document).ready(function() {
            function fetchData() {
                $.getJSON("./src/webstack.json?v=" + new Date().getTime(), function(data) {
                    let menuHtml = '';
                    let contentHtml = '';

                    $.each(data, function(i, group) {
                        // 1. 生成侧边栏菜单：增加 smooth 类名确保跳转
                        menuHtml += `
                            <li class="sidebar-item">
                                <a href="#term-${i}" class="smooth">
                                    <i class="iconfont icon-tag mr-2"></i>
                                    <span>${group.taxonomy}</span>
                                </a>
                            </li>`;

                        // 2. 生成卡片：严格遵循 .url-card -> .url-body 结构
                        let cardsHtml = group.links.map(link => `
                            <div class="url-card col-6 col-sm-6 col-md-4 col-xl-5a col-xxl-6a">
                                <div class="url-body default">
                                    <a href="${link.url}" target="_blank" class="card no-c mb-4" data-toggle="tooltip" data-placement="top" title="${link.desc}">
                                        <div class="card-body">
                                            <div class="url-content d-flex align-items-center">
                                                <div class="url-img mr-2 d-flex align-items-center justify-content-center">
                                                    <img class="lazy" src="${link.logo || './assets/images/favicon.png'}" onerror="this.src='./assets/images/favicon.png'">
                                                </div>
                                                <div class="url-info">
                                                    <strong>${link.title}</strong>
                                                    <p class="overflow_1line">${link.desc || '...'}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        `).join('');

                        contentHtml += `
                            <h4 class="text-gray text-lg mb-4">
                                <i class="site-tag iconfont icon-tag icon-lg mr-1" id="term-${i}"></i>${group.taxonomy}
                            </h4>
                            <div class="row">${cardsHtml}</div>`;
                    });

                    $('#main-menu').html(menuHtml);
                    $('#main-content-render').html(contentHtml);

                    // --- 关键修正：手动激活原作者脚本中的 UI 功能 ---
                    if (typeof($.fn.tooltip) === 'function') {
                        $('[data-toggle="tooltip"]').tooltip();
                    }
                    
                    // 绑定平滑滚动，否则动态加载的内容无法通过 a.smooth 跳转
                    $('.smooth').on('click', function(e) {
                        e.preventDefault();
                        var target = $(this).attr('href');
                        $('html, body').animate({
                            scrollTop: $(target).offset().top - 80
                        }, 500);
                    });
                });
            }

            fetchData();
            // 每 2 分钟更新一次数据
            setInterval(fetchData, 120000);
        });
    </script>

    <script type="text/javascript" src="./assets/js/bootstrap.min-4.3.1.js" id="bootstrap-js"></script>
    <script type="text/javascript" src="./assets/js/app-3.03029.1.js" id="app-js"></script>
</body>
</html>
