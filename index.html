<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FK 工具导航 - 科技推手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/iconfont.css">
    <link rel="stylesheet" href="./assets/css/bootstrap.css">
    <link rel="stylesheet" href="./assets/css/iowen.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/jquery.min.js"></script>
</head>
<body class="io-grey-mode">
    <div class="page-container">
        <div id="sidebar" class="sticky sidebar-nav">
            <div class="modal-dialog h-100 sidebar-nav-inner">
                <div class="sidebar-logo border-bottom border-color">
                    <div class="logo p-3 text-center">
                        <span style="color:#f1404b; font-weight:bold; font-size:20px;">FK 工具导航</span>
                    </div>
                </div>
                <div class="sidebar-menu flex-fill">
                    <div class="sidebar-scroll">
                        <div class="sidebar-menu-inner">
                            <ul id="main-menu" class="metismenu">
                                </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content flex-fill">
            <div class="header-big css-color mb-4" id="search-bg" style="background-image: url('./assets/images/grid.png');">
                <div class="s-search mx-auto" style="max-width:800px; padding: 100px 0 60px;">
                    <div id="search-list" class="hide-type-list text-center mb-3">
                        <div class="search-group group-a">
                            <ul class="search-type">
                                <li class="active"><span class="text-white">百度</span></li>
                            </ul>
                        </div>
                    </div>
                    <form action="https://www.baidu.com/s" method="get" target="_blank" class="super-search-fm">
                        <input type="text" name="wd" class="form-control smart-tips search-key" placeholder="百度一下，你就知道" autocomplete="off">
                        <button type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </div>
            </div>

            <div id="content" class="container-fluid">
                <div id="notion-content">
                    </div>
            </div>

            <footer class="main-footer footer-type-1 bg-white border-top p-3 text-center text-xs">
                <div class="friend-links mb-2">
                    <strong>友情链接:</strong>
                    <a href="https://blog.cunzhangblog.com" target="_blank">村长博客</a>
                </div>
                <div class="copyright">
                    <p>© 2026 By Cun Zhang | 渝ICP备2023018588号</p>
                </div>
            </footer>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // 读取你仓库里的数据
            fetch('./src/webstack.json')
            .then(res => res.json())
            .then(data => {
                let menuHtml = '';
                let contentHtml = '';

                data.forEach((group, index) => {
                    // 生成菜单
                    menuHtml += `
                        <li class="sidebar-item">
                            <a href="#term-${index}" class="smooth">
                                <i class="fas fa-star fa-fw mr-2"></i>
                                <span>${group.taxonomy}</span>
                            </a>
                        </li>`;

                    // 生成对应分类的卡片列表
                    let cardsHtml = group.links.map(link => `
                        <div class="col-6 col-md-4 col-xl-3">
                            <div class="url-card mb-4">
                                <a href="${link.url}" target="_blank" class="card">
                                    <div class="card-body p-2 d-flex align-items-center">
                                        <div class="url-img mr-2">
                                            <img src="${link.logo || './assets/images/favicon.png'}" width="40" height="40" onerror="this.src='./assets/images/favicon.png'">
                                        </div>
                                        <div class="url-info">
                                            <div class="text-bold text-sm overflow_1line">${link.title}</div>
                                            <p class="text-muted text-xs mb-0 overflow_1line">${link.desc || ''}</p>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    `).join('');

                    contentHtml += `
                        <h4 class="text-gray mb-3" id="term-${index}">
                            <i class="fas fa-tag mr-2"></i>${group.taxonomy}
                        </h4>
                        <div class="row">${cardsHtml}</div>`;
                });

                $('#main-menu').html(menuHtml);
                $('#notion-content').html(contentHtml);
            });
        });
    </script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
