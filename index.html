<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航站</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f9f9f9; }
        #sidebar { width: 200px; background: #fff; border-right: 1px solid #eee; height: 100vh; padding: 20px; position: fixed; }
        #main-menu { list-style: none; padding: 0; }
        #main-menu li { margin-bottom: 15px; }
        #main-menu a { text-decoration: none; color: #333; font-weight: bold; }
        #content-wrapper { margin-left: 240px; padding: 20px; flex: 1; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; width: 200px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card hstrong { display: block; margin-bottom: 5px; color: #007bff; }
        .card p { font-size: 12px; color: #666; margin: 0; }
        .sub-category h5 { border-left: 4px solid #007bff; padding-left: 10px; margin: 20px 0 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>分类导航</h3>
        <ul id="main-menu"><li>正在加载菜单...</li></ul>
    </div>

    <div id="content-wrapper">
        <div id="main-content">正在从 Notion 加载数据...</div>
    </div>

    <script>
fetch('./src/webstack.json')
  .then(response => response.json())
  .then(data => {
    // 兼容 Notion 常见的 results 包装格式
    const items = Array.isArray(data) ? data : (data.results || []);
    const siteStructure = {};

    items.forEach(item => {
      // --- 关键修复：增加多层级的字段读取 ---
      const getVal = (field) => {
        if (!field) return null;
        if (typeof field === 'string') return field;
        if (field.name) return field.name; // 适配 Select 字段
        if (Array.isArray(field) && field[0]) return field[0].name || field[0].plain_text; // 适配 Multi-select 或 Text
        return null;
      };

      const top = getVal(item.category) || '未分类';
      const sub = getVal(item.tags) || '默认';
      const title = getVal(item.title) || item.title || '无标题';
      const summary = getVal(item.summary) || item.summary || '暂无描述';
      const url = item.url || '#';

      if (!siteStructure[top]) siteStructure[top] = {};
      if (!siteStructure[top][sub]) siteStructure[top][sub] = [];
      siteStructure[top][sub].push({ title, summary, url });
    });

    // 渲染左侧菜单
    document.getElementById('main-menu').innerHTML = Object.keys(siteStructure).map(topName => `
        <li><a href="#${topName}">${topName}</a></li>
    `).join('');

    // 渲染右侧内容
    document.getElementById('main-content').innerHTML = Object.keys(siteStructure).map(topName => `
        <div id="${topName}">
            <h3 style="margin-top:40px; border-bottom: 2px solid #eee; padding-bottom:10px;">${topName}</h3>
            ${Object.keys(siteStructure[topName]).map(subName => `
                <div class="sub-category">
                    <h5 style="color: #666; margin: 20px 0 10px;"># ${subName}</h5>
                    <div class="row">
                        ${siteStructure[topName][subName].map(card => `
                            <div class="card" onclick="window.open('${card.url}', '_blank')" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; background: #fff;">
                                <strong style="color: #007bff; display: block;">${card.title}</strong>
                                <p style="font-size: 13px; color: #777; margin: 5px 0 0;">${card.summary}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('')}
        </div>
    `).join('');
  })
  .catch(err => {
    document.getElementById('main-content').innerHTML = `读取失败: ${err.message}`;
  });
</script>
</body>
</html>
