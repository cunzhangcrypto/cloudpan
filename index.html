<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FK 工具导航 - 科技推手</title>
    <link rel="shortcut icon" href="./assets/images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/iconfont.css">
    <link rel="stylesheet" href="./assets/css/bootstrap.css">
    <link rel="stylesheet" href="./assets/css/iowen.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/jquery.min.js"></script>
</head>
<body class="io-grey-mode">
    <div class="page-container">
        <div id="sidebar" class="sticky sidebar-nav">
            <div class="modal-dialog h-100 sidebar-nav-inner">
                <div class="sidebar-logo border-bottom border-color">
                    <div class="logo p-4 text-center">
                        <img src="./assets/images/logo@2x.png" width="160" alt="LOGO">
                    </div>
                </div>
                <div class="sidebar-menu flex-fill">
                    <div class="sidebar-scroll">
                        <div class="sidebar-menu-inner">
                            <ul id="main-menu" class="metismenu">
                                </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content flex-fill">
            <div class="header-mini d-md-noneSticky header-mini-fixed">
                <div class="d-flex align-items-center justify-content-between p-2">
                    <div id="sidebar-switch" class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
                    <div class="mobile-logo">
                        <a href="/"><img src="./assets/images/logo-mobile.png" height="30"></a>
                    </div>
                    <div class="search-modal-btn"><i class="fas fa-search"></i></div>
                </div>
            </div>

            <div id="search-bg" class="big-header-banner" style="background-image: url('./assets/images/grid.png');">
                <div class="container-fluid p-0">
                    <div class="s-search mx-auto" style="max-width:800px; padding: 100px 0 60px;">
                        <div id="search-list" class="hide-type-list text-center mb-3">
                            <div class="search-group group-a">
                                <ul class="search-type">
                                    <li class="active"><span class="text-white">百度</span></li>
                                </ul>
                            </div>
                        </div>
                        <form action="https://www.baidu.com/s" method="get" target="_blank" class="super-search-fm">
                            <input type="text" name="wd" class="form-control smart-tips search-key" placeholder="搜索你想找的..." autocomplete="off">
                            <button type="submit"><i class="fas fa-search"></i></button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="content" class="content-site customize-site container-fluid p-md-4">
                <div id="notion-data-container">
                    <div class="text-center p-5"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
                </div>
            </div>

            <footer class="main-footer footer-type-1 bg-white border-top p-3 text-center text-xs">
                <div class="copyright">
                    <p>© 2026 By <a href="https://blog.cunzhangblog.com">Cun Zhang</a> | 渝ICP备2023018588号</p>
                </div>
            </footer>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // 抓取你仓库 src 目录下的 json
            fetch('./src/webstack.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                let menuHtml = '';
                let contentHtml = '';

                data.forEach((group, index) => {
                    // 1. 生成侧边栏菜单
                    menuHtml += `
                        <li class="sidebar-item">
                            <a href="#term-${index}" class="smooth">
                                <i class="fas fa-angle-right mr-2"></i>
                                <span>${group.taxonomy}</span>
                            </a>
                        </li>`;

                    // 2. 生成网站卡片 (严格按照 WebStack 原版 HTML 结构)
                    let cardsHtml = group.links.map(link => `
                        <div class="url-card col-6 col-sm-6 col-md-4 col-xl-5a col-xxl-6a">
                            <div class="url-body default">
                                <a href="${link.url}" target="_blank" class="card no-c mb-4" title="${link.desc}">
                                    <div class="card-body">
                                        <div class="url-content d-flex align-items-center">
                                            <div class="url-img mr-2 d-flex align-items-center justify-content-center">
                                                <img class="lazy" src="${link.logo || './assets/images/favicon.png'}" onerror="this.src='./assets/images/favicon.png'">
                                            </div>
                                            <div class="url-info">
                                                <strong>${link.title}</strong>
                                                <p class="overflow_1line">${link.desc || ''}</p>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    `).join('');

                    contentHtml += `
                        <h4 class="text-gray text-lg mb-4">
                            <i class="site-tag iconfont icon-tag icon-lg mr-1" id="term-${index}"></i>${group.taxonomy}
                        </h4>
                        <div class="row">${cardsHtml}</div>`;
                });

                $('#main-menu').html(menuHtml);
                $('#notion-data-container').html(contentHtml);

                // 激活原版的平滑滚动和手机端菜单
                $('#sidebar-switch').click(function() {
                    $('.page-container').toggleClass('sidebar-collapsed');
                });
            });
        });
    </script>
    
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
